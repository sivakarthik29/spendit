    <!-- Shim for process.env for local development -->
    <script>
      if (typeof window !== 'undefined' && !window.process) {
        window.process = { env: { API_KEY: window.process?.env?.API_KEY || '' } };
      }
      
      // Check for file:// protocol which breaks modules
      if (window.location.protocol === 'file:') {
        alert('Warning: This app uses ES Modules and must be served via a local web server (e.g., npx serve) to work correctly.');
      }
    </script>

    <script>
      tailwind.config = {

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #FFFFFF;
        color: #0F172A;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F1F5F9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94A3B8; 
      }

      /* Custom Animations to support animate-in classes */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideInFromBottom {
        from { transform: translateY(1.5rem); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slideInFromRight {
        from { transform: translateX(1.5rem); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes zoomIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .animate-in {
        animation-duration: 400ms;
        animation-fill-mode: both;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      .fade-in { animation-name: fadeIn; }
      .slide-in-from-bottom-10 { animation-name: slideInFromBottom; }
      .slide-in-from-right-10 { animation-name: slideInFromRight; }
      .zoom-in-95 { animation-name: zoomIn; }
      
      .duration-500 { animation-duration: 500ms; }
      .duration-700 { animation-duration: 700ms; }
    </style>
